# ══════════════════════════════════════════════════════════════════════════════
# HUGOBLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# Documentation: https://docs.hugoblox.com/
# ══════════════════════════════════════════════════════════════════════════════
hugoblox:
  schema: "2.0"

  # ────────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # ────────────────────────────────────────────────────────────────────────────
  identity:
    name: "이관용"
    organization: ""
    type: person # person | organization | local_business
    tagline: "마트 창고 매니저"
    description: "보이지 않는 곳에서 완벽한 흐름을 관리하는 마트 창고 매니저 이관용의 성실한 일상과 업무 기록 공간입니다."
    social:
      twitter: ""

  # ────────────────────────────────────────────────────────────────────────────
  # THEME
  # ────────────────────────────────────────────────────────────────────────────
  theme:
    mode: system # light | dark | system
    pack: "default"
    colors:
      primary: ""
      secondary: ""
      neutral: ""

  # ────────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # ────────────────────────────────────────────────────────────────────────────
  typography:
    pack: "system"

  # ────────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # ────────────────────────────────────────────────────────────────────────────
  layout:
    radius: "md" # none | sm | md | lg | full
    spacing: "spacious" # compact | comfortable | spacious
    avatar_shape: circle # circle | square | rounded

  # ────────────────────────────────────────────────────────────────────────────
  # HEADER
  # ────────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    style: navbar # navbar | navbar-simple | minimal
    sticky: true
    align: center # left | center | right
    search: false
    theme_toggle: true

  # ────────────────────────────────────────────────────────────────────────────
  # FOOTER
  # ────────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal # minimal | columns | centered

  # ────────────────────────────────────────────────────────────────────────────
  # COPYRIGHT
  # ────────────────────────────────────────────────────────────────────────────
  copyright:
    notice: "© {year} {name}"

  # ────────────────────────────────────────────────────────────────────────────
  # CONTENT
  # ────────────────────────────────────────────────────────────────────────────
  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true

  # ────────────────────────────────────────────────────────────────────────────
  # SEARCH
  # ────────────────────────────────────────────────────────────────────────────
  search:
    enable: false

  # ────────────────────────────────────────────────────────────────────────────
  # LOCALE
  # ────────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
